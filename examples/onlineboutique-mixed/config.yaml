name: onlineboutique-mixed
locustfile: ../../../apps/onlineboutique/locustfile.py
host: http://192.168.101.65:30080
# Zone-tagged endpoints. Zone distribution is calculated before selecting an
# endpoint, so each zone receives its configured share regardless of node count.
endpoints:
  - url: http://192.168.101.65:30080
    zone: zone-a
  - url: http://192.168.101.66:30080
    zone: zone-a
  - url: http://192.168.101.67:30080
    zone: zone-b
  - url: http://192.168.101.68:30080
    zone: zone-b
output_dir: output

# Interval, in seconds, used to sample the ideal workload curve into csv/ideal_rps.csv.
# This affects generated data/plots, not Locust's internal request timing.
sample_interval_s: 1
slo_ms: 250
p95_window_s: 5

pattern:
  type: mixed
  parts:
    #- type: constant
    #  rps: 30
    #  duration: 5m
    #- type: sinusoidal
    #  baseline_rps: 185
    #  amplitude_rps: 115
    #  period: 10m
    #  duration: 20m
    #- type: exponential
    #  start_rps: 70
    #  end_rps: 450
    #  curve: 3.0
    #  duration: 5m
    #- type: constant
    #  rps: 70
    #  duration: 5m
    - type: constant
      rps: 30
      duration: 5m
    - type: constant
      rps: 30
      duration: 5m
    - type: constant
      rps: 30
      duration: 5m
    #- type: sinusoidal
    #  baseline_rps: 30
    #  amplitude_rps: 30
    #  period: 2m
    #  duration: 4m
    #- type: exponential
    #  start_rps: 30
    #  end_rps: 100
    #  curve: 3.0
    #  duration: 2m

# Geographic traffic evolution, independent from the RPS pattern above. The
# total duration must match the workload pattern duration.
zone_distribution:
  type: mixed
  parts:
    # Start with all requests entering through zone-a.
    - type: constant
      duration: 5m
      primary_zone: zone-a
      spread: 0
    # Gradually move from the zone-a hotspot to a uniform distribution.
    - type: linear
      duration: 5m
      primary_zone: zone-a
      start_spread: 0
      end_spread: 1
    # Finish with 90% in zone-b and 10% in zone-a.
    - type: constant
      duration: 5m
      primary_zone: zone-b
      spread: 0.2

kubernetes:
  enabled: true
  namespace: default
  # Interval, in seconds, for polling deployment replica counts with kubectl.
  sample_interval_s: 5
  # Optional label selector to restrict deployment replica collection.
  selector: group=onlineboutique
  kubeconfig: ../../../kubeconfig-ctx-cluster-01
